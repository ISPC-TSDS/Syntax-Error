<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <link rel="stylesheet" href="styles/style.css" />
</head>

<body>
    <nav class="navbar navbar-expand-lg bg-body-tertiary">
        <div class="container-fluid">
            <a class="navbar-brand" href="index.html">
                Syntax<span>Hub</span>
            </a>

            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>

            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav ms-auto">
                    <li class="nav-item">
                        <a class="nav-link active" href="index.html">
                            Inicio
                        </a>
                    </li>

                    <li class="nav-item">
                        <a class="nav-link active" href="about.html">
                            Sobre Nosotros
                        </a>
                    </li>

                    <li class="nav-item">
                        <a href="login.html" class="btn btn-primary">
                            Iniciar Sesión
                        </a>
                    </li>
                </ul>
            </div>
        </div>
    </nav>
    <section class="container d-flex justify-content-center align-items-center my-5 flex-grow-1">
        <div class="card p-4 shadow border-0 text-center" style="max-width: 400px; width: 100%;">
            <h2 class="fw-bold mb-4 text-secondary">Iniciar Sesión</h2>

            <form id="loginForm">
                <div class="mb-3 text-start">
                    <label for="username" class="form-label fw-medium text-muted">Correo electrónico o usuario:</label>
                    <input type="text" id="username" name="username" class="form-control form-control-lg">
                </div>

                <div class="mb-3 text-start">
                    <label for="password" class="form-label fw-medium text-muted">Contraseña:</label>
                    <input type="password" id="password" name="password" class="form-control form-control-lg">
                </div>

                <div id="error-message" class="alert alert-danger py-2 text-start d-none" role="alert"></div>

                <a href="dashboard_user.html" class="btn btn-primary btn-lg w-100 fw-bold mt-2 shadow-sm">
                    Iniciar Sesión
                </a>
            </form>

            <div class="mt-4 pt-3 border-top border-light-subtle">
                <p class="small mb-2">
                    <a href="recover_password.html" class="text-decoration-none text-primary fw-semibold">Olvidé mi clave</a>
                </p>
                <p class="small text-muted mb-0">
                    ¿No tienes cuenta? <a href="register.html"
                        class="text-decoration-none text-primary fw-semibold">Registrarse</a>
                </p>
            </div>
        </div>
    </section>

    <footer class="bg-dark text-white text-center py-3">
        <p class="mb-0">&copy; 2026 Syntax Hub - Córdoba, Argentina. Hecho por Syntax Error.</p>
    </footer>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
        crossorigin="anonymous"></script>
</body>

</html>
