<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login</title>
    <link rel="stylesheet" href="./styles/style.css">
</head>

<body>
    <header class="navbar">
        <div class="logo">
            <a href="index.html">Syntax<span>Hub</span></a>
        </div>

        <nav class="nav-links">
            <ul>
                <li><a href="index.html">Inicio</a></li>
                <li><a href="about.html">Nosotros</a></li>
                <li><a href="login.html" class="btn-login">Iniciar Sesión</a></li>
            </ul>
        </nav>
    </header>
    <section class="login-container">
        <h2>Iniciar Sesión</h2>

        <form id="loginForm">
            <div class="form-group">
                <label for="username">Correo electrónico o usuario:</label>
                <input type="text" id="username" name="username">
            </div>
            <div class="form-group">
                <label for="password">Contraseña:</label>
                <input type="password" id="password" name="password">
            </div>
            <div id="error-message" class="error-text"></div>
            <a href="dashboard_user.html"><button type="button">Iniciar Sesión</button></a>
        </form>

        <div class="login-footer">
            <p><a href="#">Olvidé mi clave</a></p>
            <p>¿No tienes cuenta? <a href="register.html">Registrarse</a></p>
        </div>
    </section>
    <footer>
        <p>&copy; 2026 Syntax Hub - Córdoba, Argentina. Hecho por Syntax Error.</p>
    </footer>
</body>

</html>
