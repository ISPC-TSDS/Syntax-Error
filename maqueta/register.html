<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registro | Syntax Hub</title>
    <link rel="stylesheet" href="styles/style.css">
</head>

<body>

    <header class="navbar">
        <div class="logo">
            <a href="index.html">Syntax<span>Hub</span></a>
        </div>

        <nav class="nav-links">
            <ul>
                <li><a href="about.html">Nosotros</a></li>
                <li><a href="login.html" class="btn-login">Iniciar Sesión</a></li>
            </ul>
        </nav>
    </header>

    <main class="registro-contenedor">

        <div class="registro-caja">

            <h2>Crear una cuenta</h2>

            <form action="login.html" method="GET">

                <div class="campo">
                    <label for="nombre">Nombre</label>
                    <input type="text" id="nombre" placeholder="Ingrese su nombre">
                </div>

                <div class="campo">
                    <label for="apellido">Apellido</label>
                    <input type="text" id="apellido" placeholder="Ingrese su apellido">
                </div>

                <div class="campo">
                    <label for="email">Correo electrónico</label>
                    <input type="email" id="email" placeholder="ejemplo@mail.com">
                </div>

                <div class="campo">
                    <label for="password">Contraseña</label>
                    <input type="password" id="password" placeholder="Mínimo 8 caracteres">
                </div>

                <div class="campo">
                    <label for="confirm-password">Confirmar contraseña</label>
                    <input type="password" id="confirm-password" placeholder="Reingrese su contraseña">
                </div>

                <button type="submit" class="btn-registro">
                    Registrarme
                </button>

            </form>

        </div>

    </main>

    <footer>
        <p>&copy; 2026 Syntax Hub - Córdoba, Argentina. Hecho por Syntax Error.</p>
    </footer>

</body>

</html>
