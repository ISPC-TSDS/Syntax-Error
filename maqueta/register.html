<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registro | Syntax Hub</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <link rel="stylesheet" href="styles/style.css" />
</head>

<body class="d-flex flex-column min-vh-100">

    <nav class="navbar navbar-expand-lg bg-body-tertiary">
        <div class="container-fluid">
            <a class="navbar-brand" href="index.html">
                Syntax<span>Hub</span>
            </a>

            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>

            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav ms-auto">
                    <li class="nav-item">
                        <a class="nav-link active" href="index.html">
                            Inicio
                        </a>
                    </li>

                    <li class="nav-item">
                        <a class="nav-link active" href="about.html">
                            Sobre Nosotros
                        </a>
                    </li>

                    <li class="nav-item">
                        <a href="login.html" class="btn btn-primary">
                            Iniciar Sesión
                        </a>
                    </li>
                </ul>
            </div>
        </div>
    </nav>

    <section class="container d-flex justify-content-center align-items-center my-5 flex-grow-1">
        <div class="card p-4 shadow border-0 text-center" style="max-width: 400px; width: 100%;">
            <h2 class="fw-bold mb-4 text-secondary">Crear una cuenta</h2>

            <form>
                <div class="mb-3 text-start">
                    <label for="nombre" class="form-label fw-medium text-muted">Nombre:</label>
                    <input type="text" id="nombre" class="form-control form-control-lg" placeholder="Ingrese su nombre" required style="font-size: 0.9rem;">
                </div>

                <div class="mb-3 text-start">
                    <label for="apellido" class="form-label fw-medium text-muted">Apellido:</label>
                    <input type="text" id="apellido" class="form-control form-control-lg" placeholder="Ingrese su apellido" required style="font-size: 0.9rem;">
                </div>

                <div class="mb-3 text-start">
                    <label for="email" class="form-label fw-medium text-muted">Correo electrónico:</label>
                    <input type="email" id="email" class="form-control form-control-lg" placeholder="ejemplo@mail.com" required style="font-size: 0.9rem;">
                </div>

                <div class="mb-3 text-start">
                    <label for="password" class="form-label fw-medium text-muted">Contraseña:</label>
                    <input type="password" id="password" class="form-control form-control-lg" placeholder="Mínimo 8 caracteres" required style="font-size: 0.9rem;">
                </div>

                <div class="mb-4 text-start">
                    <label for="confirm-password" class="form-label fw-medium text-muted">Confirmar contraseña:</label>
                    <input type="password" id="confirm-password" class="form-control form-control-lg" placeholder="Reingrese su contraseña" required style="font-size: 0.9rem;">
                </div>

                <a href="login.html" class="btn btn-primary btn-lg w-100 fw-bold mt-3 shadow-sm">Registrarme</a>
            </form>

            <div class="mt-4 pt-3 border-top border-light-subtle">
                <p class="small text-muted mb-0">
                    ¿Ya tienes cuenta? <a href="login.html" class="text-decoration-none text-primary fw-semibold">Iniciar Sesión</a>
                </p>
            </div>
        </div>
    </section>

    <footer class="bg-dark text-white text-center py-2 mt-auto"> 
        <div class="container py-3">
             <p class="mb-0">&copy; 2026 Syntax Hub - Córdoba, Argentina. Hecho por Syntax Error.</p>   
        </div>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
        crossorigin="anonymous"></script>
</body>
</html>
