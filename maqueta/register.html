<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
   <title>Registro - SINTAX HUB</title> <link rel="stylesheet" href="styles/style.css">
   </head>
<body>
    <header class="navbar">
        <div class="logo">
            <a href="home.html">Syntax<span>Hub</span></a>
        </div>

        <nav class="nav-links">
            <ul>
                <li><a href="about.html">Nosotros</a></li>
                <li><a href="login.html" class="btn-login">Iniciar Sesión</a></li>
            </ul>
        </nav>
    </header>
    
   <main class="registro-contenedor">
    <div class="registro-caja">
        <h2>Crear una cuenta</h2>
        
        <form>
            <div class="campo">
                <label>Nombre completo</label>
                <input type="text" placeholder="Tu nombre completo">
            </div>

            <div class="campo">
                <label>Correo electrónico</label>
                <input type="email" placeholder="ejemplo@mail.com">
            </div>

            <div class="campo">
                <label>Contraseña</label>
                <input type="password" placeholder="Mínimo 8 caracteres"
            </div>

            <button type="submit" class="btn-registro">Registrarme</button>
        </form>
    </div>
</main>
