<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <link rel="stylesheet" href="styles/style.css" />
</head>

<body class="d-flex flex-column min-vh-100">
    <nav class="navbar navbar-expand-lg bg-body-tertiary">
        <div class="container-fluid">
            <a class="navbar-brand" href="index.html">
                Syntax<span>Hub</span>
            </a>

            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>

            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav ms-auto">
                    <li class="nav-item">
                        <a class="nav-link" href="index.html">Inicio</a>
                    </li>
                </ul>
            </div>
        </div>
    </nav>

    <section class="container flex-grow-1 d-flex justify-content-center align-items-center my-5">
        <div class="card p-4 shadow-sm text-center border-0"
            style="max-width: 450px; width: 100%; border-radius: 12px; background: #ffffff;">

            <h2 class="fw-bold text-secondary mb-3">Recuperar Clave</h2>
            <p class="text-muted small mb-4">Ingresa tu correo electrónico y te enviaremos las instrucciones para
                restablecer tu contraseña.</p>

            <form id="recoveryForm">
                <div class="mb-4 text-start">
                    <label for="recoveryEmail" class="form-label fw-medium text-muted">Cargar mail:</label>
                    <input type="email" id="recoveryEmail" name="email" class="form-control form-control-lg"
                        placeholder="ejemplo@correo.com" required>
                </div>

                <div id="success-message" class="alert alert-success py-2 text-start d-none" role="alert">
                    Se envió el mail de recupero de clave.
                </div>

                <button type="submit" id="submitBtn" class="btn btn-primary btn-lg w-100 fw-bold mt-2 shadow-sm">
                    Recuperar Clave
                </button>
            </form>

            <div class="mt-4 pt-3 border-top border-light-subtle">
                <p class="small mb-0">
                    ¿Te acordaste de tu contraseña? <a href="login.html"
                        class="text-decoration-none text-primary fw-semibold">Iniciar Sesión</a>
                </p>
            </div>
        </div>
    </section>

    <footer class="bg-dark text-white text-center py-3 mt-auto">
        <p class="mb-0">&copy; 2026 Syntax Hub - Córdoba, Argentina. Hecho por Syntax Error.</p>
    </footer>


</body>

</html>
